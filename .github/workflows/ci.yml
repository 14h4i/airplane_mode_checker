name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze, test, and validate package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
        with:
          channel: stable
          cache: true

      - name: Get package dependencies
        run: flutter pub get

      - name: Analyze package
        run: flutter analyze

      - name: Test package
        run: flutter test

      - name: Get example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze example
        working-directory: example
        run: flutter analyze

      - name: Test example
        working-directory: example
        run: flutter test

      - name: Validate package publication
        run: dart pub publish --dry-run

  ios-integrations:
    name: iOS integrations (${{ matrix.label }})
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Flutter 3.24.5
            flutter-version: 3.24.5
            channel: any
            lint-cocoapods: false
          - label: Flutter stable
            flutter-version: ''
            channel: stable
            lint-cocoapods: true

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
        with:
          channel: ${{ matrix.channel }}
          flutter-version: ${{ matrix.flutter-version }}
          cache: true

      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager

      - name: Get example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build iOS example
        working-directory: example
        run: flutter build ios --no-codesign

      - name: Lint CocoaPods specification
        if: matrix.lint-cocoapods
        run: >-
          pod lib lint ios/airplane_mode_checker.podspec
          --configuration=Debug
          --skip-tests
          --use-modular-headers
          --allow-warnings
